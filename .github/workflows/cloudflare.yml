name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Seraphim App
        run: |
          cd demo/seraphim
          flutter pub get
          flutter build web --base-href /seraphim/app/
          mkdir -p ../../dev-linkeddata-au/seraphim/app
          cp -r build/web/* ../../dev-linkeddata-au/seraphim/app/
          touch ../../dev-linkeddata-au/.nojekyll

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Publish to Cloudflare Workers Static Assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
