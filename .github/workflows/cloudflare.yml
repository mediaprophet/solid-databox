name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Seraphim App
        run: |
          cd demo/seraphim
          flutter pub get
          flutter build web --base-href /seraphim/app/
          mkdir -p ../../dev-linkeddata-au/seraphim/app
          cp -r build/web/* ../../dev-linkeddata-au/seraphim/app/
          touch ../../dev-linkeddata-au/.nojekyll

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dev-linkeddata-au --project-name=solid-databox
